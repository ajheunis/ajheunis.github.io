<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thank You — Adam Heunis</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <link rel="stylesheet" href="css/index.css">
    <style>
        .thanks {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(ellipse 60% 50% at 50% 10%, rgba(198, 161, 91, 0.07), transparent 65%),
                var(--bg);
        }

        .thanks-card {
            max-width: 520px;
            text-align: center;
        }

        .thanks-card .eyebrow {
            margin-bottom: 1.4rem;
        }

        .thanks-card h1 {
            font-size: clamp(2.2rem, 5vw, 3rem);
        }

        .thanks-card p {
            margin-bottom: 2.2rem;
        }
    </style>
</head>

<body>
    <main class="thanks">
        <div class="thanks-card">
            <p class="eyebrow">Message received</p>
            <h1>Thank you.</h1>
            <p>Your message is on its way — I read every one personally and will get back to you shortly.</p>
            <a href="/" class="btn btn-solid">Back to the site</a>
        </div>
    </main>
</body>

</html>
